<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IAM Defender — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .logo h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.3px;
    }
    .logo p {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 4px;
    }
    .badge {
      display: inline-block;
      background: #3b82f6;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 0.35rem;
      letter-spacing: 0.3px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 7px;
      color: #f1f5f9;
      font-size: 0.9rem;
      padding: 0.6rem 0.85rem;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1rem;
    }
    input:focus {
      border-color: #3b82f6;
    }

    button[type="submit"] {
      width: 100%;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.65rem;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.25rem;
    }
    button:hover { background: #2563eb; }

    .error {
      background: #450a0a;
      border: 1px solid #ef4444;
      color: #fca5a5;
      border-radius: 6px;
      font-size: 0.82rem;
      padding: 0.55rem 0.85rem;
      margin-bottom: 1rem;
    }

    .footer {
      text-align: center;
      font-size: 0.72rem;
      color: #475569;
      margin-top: 1.6rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="badge">IAM Defender</div>
      <h1>Sign in</h1>
      <p>Privilege Escalation Detection Engine</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <label for="username">Username</label>
      <input type="text" id="username" name="username"
             autocomplete="username" autofocus required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             autocomplete="current-password" required>

      <button type="submit">Sign in</button>
    </form>

    <div class="footer">
      Set credentials via <code>IAM_ADMIN_USER</code> / <code>IAM_ADMIN_PASSWORD</code> env vars
    </div>
  </div>
</body>
</html>
